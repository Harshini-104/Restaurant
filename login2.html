<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Original+Surfer&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Amarante&family=Original+Surfer&display=swap" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Amarante&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Original+Surfer&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Quintessential&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>


  <!-- Header -->
  <header class="navbar">
    <div class="nav-container">

      <div class="logo">
        <a href=""><img src="./image/logo-removebg-preview.webp" alt=" Logo"></a>
      </div>

      <nav class="nav-menu">
        <ul>
          <li><a href="./home2.html">Home</a></li>
          <li><a href="./about2.html">About</a></li>
          <li><a href="./menu2.html">Menu</a></li>
          <li><a href="./blog2.html">Blog</a></li>
          <li><a href="./dashboard2.html">Dashboard</a></li>
          <li><a href="./contact2.html">Contact</a></li>
          

        </ul>
      </nav>


      <div class="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </div>

    </div>
  </header>



  <!-- section form -->


  <!-- section login -->

  <div class="auth-wrapper">

    <!-- Left Image Section -->
    <div class="auth-left">
      <div class="overlay-text">
        <h1>Welcome to DreamHome</h1>
        <p>Your perfect property partner.</p>
      </div>
    </div>

    <!-- Right Form Section -->
    <div class="auth-right">

      <div class="form-container">

        <!-- Tabs -->
        <div class="form-tabs">
          <button class="tab-btn active" onclick="showLogin()">Login</button>
          <button class="tab-btn" onclick="showSignup()">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="form active-form">
          <h2>Login</h2>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="form">
          <h2>Create Account</h2>
          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email" required>
          <input type="password" placeholder="Password" required>
          <input type="password" placeholder="Re-enter Password" required>
          <button type="submit">Sign Up</button>
        </form>

      </div>

    </div>

  </div>

  <script>
    function showLogin() {
      document.getElementById("loginForm").classList.add("active-form");
      document.getElementById("signupForm").classList.remove("active-form");
      document.querySelectorAll(".tab-btn")[0].classList.add("active");
      document.querySelectorAll(".tab-btn")[1].classList.remove("active");
    }

    function showSignup() {
      document.getElementById("signupForm").classList.add("active-form");
      document.getElementById("loginForm").classList.remove("active-form");
      document.querySelectorAll(".tab-btn")[1].classList.add("active");
      document.querySelectorAll(".tab-btn")[0].classList.remove("active");
    }
  </script>

  <script>
    const toggle = document.querySelector(".menu-toggle");
    const navMenu = document.querySelector(".nav-menu");

    toggle.addEventListener("click", () => {
      navMenu.classList.toggle("active");
    });
  </script>






  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #f4f9fb;
      display: flex;
    }


    .navbar {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(17, 1, 53, 0.1);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      width: 180px;
      filter: sepia(1) saturate(23) hue-rotate(-20deg);
    }

    .nav-menu ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    .nav-menu a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: 0.3s;
      font-size: 20px;
      font-family: "Comic Relief", system-ui;
      font-weight: 400;
      font-style: normal;
    }

    .nav-menu a:hover {
      padding: 8px 20px;
      background: #fb2b28;
      color: white;
      border-radius: 10px;
    }

    .nav-btn {
      margin-left: 20px;
    }

    .login-btn {
      padding: 8px 20px;
      background: #fb2b28;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 500;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #2917ef;
    }

    .menu-toggle {
      display: none;
      font-size: 24px;
      cursor: pointer;
      color: white;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      /* background-color: #f9f9f9; */
      min-width: 130px;
      /* box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); */
      padding: 12px 16px;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }




    @media (max-width: 768px) {

      .menu-toggle {
        display: block;
      }

      .nav-menu {
        position: absolute;
        top: 70px;
        right: 0px;
        width: 350px;
        height: 500px;
        background: rgba(104, 104, 106, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        padding: 50px;
        display: none;
        flex-direction: column;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }


      .nav-menu ul {
        flex-direction: column;
        gap: 40px;

      }

      .nav-menu ul li a {
        font-size: 16px;
        color: rgb(255, 255, 255);
      }

      .nav-menu.active {
        display: flex;
      }

      .nav-btn {
        display: block;
        margin-left: 0;
      }

      .login-btn {
        padding: 6px 15px;
        font-size: 14px;
      }

      .logo img {
        height: 50px;
        width: 160px;
      }
    }

    body {
      height: 118vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
    }

    .auth-wrapper {
      width: 1000px;
      height: 600px;
      display: flex;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      background: #fff;
    }


    .auth-left {
      width: 50%;
      background: url('./image/error.webp') center/cover no-repeat;
      position: relative;
    }

    .auth-left::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(188, 26, 26, 0.7);
      top: 0;
      left: 0;
    }

    .overlay-text {
      position: absolute;
      color: #fff;
      z-index: 2;
      text-align: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .overlay-text h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }


    .auth-right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      width: 80%;
    }


    .form-tabs {
      display: flex;
      margin-bottom: 30px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: #eee;
      cursor: pointer;
      font-weight: bold;
    }

    .tab-btn.active {
      background: #fa0404;
      color: #fff;
    }


    .form {
      display: none;
      flex-direction: column;
    }

    .form.active-form {
      display: flex;
    }

    .form h2 {
      margin-bottom: 20px;
      color: #fa0404;
    }

    .form input {
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .form button {
      padding: 12px;
      border: none;
      background: #fa0404;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .form button:hover {
      background: #af1c1c;
    }


    @media (max-width: 992px) {

      body {
        align-items: flex-start;
        padding: 40px 0;
      }

      .auth-wrapper {
        width: 95%;
        height: auto;
        flex-direction: column;
      }

      .auth-left {
        width: 100%;
        height: 250px;
      }

      .auth-right {
        width: 100%;
        padding: 40px 0;
      }

      .form-container {
        width: 85%;
      }


      .form {
        position: relative;
        display: none;
      }

      .form.active-form {
        display: flex;
      }
    }



    @media (max-width: 576px) {

      .auth-left {
        height: 200px;
      }

      .overlay-text h1 {
        font-size: 24px;
      }

      .form-tabs {
        margin-bottom: 20px;
      }

      .tab-btn {
        font-size: 14px;
        padding: 10px;
      }

      .form h2 {
        font-size: 20px;
      }

      .form input {
        font-size: 14px;
        padding: 10px;
      }

      .form button {
        font-size: 14px;
        padding: 10px;
      }

    }
  </style>


</body>

</html>
