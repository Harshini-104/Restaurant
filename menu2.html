<!-- HEADER -->

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h2>Your Cart</h2>
        <i class="fa fa-times" onclick="toggleCart()" style="cursor:pointer;"></i>
    </div>

    <div id="cartItems"></div>

    <div class="total">
        Total: ₹<span id="cartTotal">0</span>
    </div>
</div>

<script>

const dishes = [
    {name:"Chicken Biryani", price:250},
    {name:"Mutton Curry", price:320},
    {name:"Paneer Butter Masala", price:220},
    {name:"Grilled Chicken", price:280},
    {name:"Veg Fried Rice", price:180},
    {name:"Chicken Noodles", price:190},
    {name:"Pizza Margherita", price:299},
    {name:"Burger Combo", price:199},
    {name:"Tandoori Chicken", price:350},
    {name:"Fish Fry", price:270},
    {name:"Masala Dosa", price:120},
    {name:"Idli Sambar", price:80},
    {name:"Pasta Alfredo", price:240},
    {name:"Chocolate Cake", price:150},
    {name:"Ice Cream Sundae", price:130},
    {name:"Fresh Lime Juice", price:60}
];

const menuGrid = document.getElementById("menuGrid");
const cartSidebar = document.getElementById("cartSidebar");
const cartItemsDiv = document.getElementById("cartItems");
const cartCount = document.getElementById("cartCount");
const cartTotal = document.getElementById("cartTotal");

let cart = [];

/* Display Menu */
function displayMenu(items){
    menuGrid.innerHTML = "";
    items.forEach((dish,index)=>{
        menuGrid.innerHTML += `
            <div class="menu-card">
                <img src="https://source.unsplash.com/400x300/?food,${index}" />
                <div class="menu-content">
                    <h3>${dish.name}</h3>
                    <div class="price">₹${dish.price}</div>
                    <button class="add-btn" onclick="addToCart(${index})">Add to Cart</button>
                </div>
            </div>
        `;
    });
}

/* Add To Cart */
function addToCart(index){
    const dish = dishes[index];
    const existing = cart.find(item => item.name === dish.name);

    if(existing){
        existing.quantity++;
    } else {
        cart.push({...dish, quantity:1});
    }

    updateCart();
    toggleCart();
}

/* Update Cart UI */
function updateCart(){
    cartItemsDiv.innerHTML = "";
    let total = 0;
    let count = 0;

    cart.forEach(item=>{
        total += item.price * item.quantity;
        count += item.quantity;

        cartItemsDiv.innerHTML += `
            <div class="cart-item">
                <div>
                    <strong>${item.name}</strong><br>
                    ₹${item.price} x ${item.quantity}
                </div>
                <div>₹${item.price * item.quantity}</div>
            </div>
        `;
    });

    cartTotal.textContent = total;
    cartCount.textContent = count;
}

/* Toggle Cart */
function toggleCart(){
    cartSidebar.classList.toggle("active");
}

/* Search */
document.getElementById("searchInput").addEventListener("keyup",function(){
    const value = this.value.toLowerCase();
    const filtered = dishes.filter(dish =>
        dish.name.toLowerCase().includes(value)
    );
    displayMenu(filtered);
});

displayMenu(dishes);

</script>

    </script>
