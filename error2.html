
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
</head>
<body>
    <section class="error-section">
    <div class="error-content">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Oops! Page Not Found</h2>
        <p class="error-text">
            The page you are looking for doesn't exist or has been moved.
        </p>

        <div class="error-buttons">
            <a href="./error2.html" class="btn-home">Back to Home</a>
        </div>
    </div>
</section>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.error-section {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('./image/error.webp') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
    padding: 20px;
}

.error-content {
    max-width: 600px;
}

.error-code {
    font-size: 120px;
    font-weight: 800;
    margin-bottom: 10px;
    color: #ffffff;
}

.error-title {
    font-size: 32px;
    margin-bottom: 15px;
}

.error-text {
    font-size: 18px;
    margin-bottom: 30px;
    color: #ddd;
}

.error-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn-home,
.btn-properties {
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s ease;
}

.btn-home {
    background: #fa0404;
    color: #fff;
}

.btn-home:hover {
    background: #f43434;
}

.btn-properties {
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
}

.btn-properties:hover {
    background: #fff;
    color: #000;
}

</style>

</body>
</html>
